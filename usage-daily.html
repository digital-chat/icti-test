<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ICTI Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

:root{
    --primary:#6C63FF;
    --secondary:#4D44DB;
    --bg:#0f172a;
    --card:#111c44;
    --input:#1e2a5a;
    --text:#ffffff;
    --muted:#b8c1ec;
    --success:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
    var(--bg);

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:850px;
    background:rgba(17,28,68,0.85);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    padding:40px;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 1px 1px rgba(255,255,255,0.05);
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    color:var(--text);
    font-size:42px;
    font-weight:700;
    letter-spacing:1px;
}

.header p{
    color:var(--muted);
    margin-top:10px;
    font-size:15px;
}

.search-box{
    position:relative;
    margin-bottom:30px;
}

.search-box input{
    width:100%;
    height:65px;
    border:none;
    outline:none;
    border-radius:18px;
    padding:0 25px 0 60px;
    background:var(--input);
    color:white;
    font-size:17px;
    transition:0.3s;
    border:2px solid transparent;
}

.search-box input:focus{
    border-color:var(--primary);
    box-shadow:0 0 20px rgba(108,99,255,0.35);
}

.search-icon{
    position:absolute;
    left:22px;
    top:50%;
    transform:translateY(-50%);
    font-size:22px;
    color:#9aa4d4;
}

.result-container{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.result-card{
    background:linear-gradient(135deg,#182452,#131d44);
    border-radius:20px;
    padding:22px;
    border:1px solid rgba(255,255,255,0.06);
    transition:0.3s;
}

.result-card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.package-title{
    color:white;
    font-size:20px;
    font-weight:600;
    margin-bottom:18px;
}

.icti-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
}

.icti-code{
    background:rgba(255,255,255,0.08);
    color:#8be9fd;
    padding:14px 18px;
    border-radius:14px;
    font-size:17px;
    font-weight:600;
    width:100%;
    overflow:auto;
}

.copy-btn{
    min-width:120px;
    height:50px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.copy-btn:hover{
    transform:scale(1.04);
}

.empty-state{
    text-align:center;
    padding:40px 10px;
    color:var(--muted);
}

.empty-state h2{
    font-size:24px;
    margin-bottom:10px;
}

.toast{
    position:fixed;
    bottom:30px;
    right:30px;
    background:var(--success);
    color:white;
    padding:14px 22px;
    border-radius:14px;
    font-weight:600;
    opacity:0;
    transform:translateY(20px);
    transition:0.3s;
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}

@media(max-width:768px){

    .container{
        padding:25px;
    }

    .header h1{
        font-size:32px;
    }

    .icti-row{
        flex-direction:column;
        align-items:stretch;
    }

    .copy-btn{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>ICTI Tool</h1>
        <p>Search package name and instantly copy ICTI</p>
    </div>

    <div class="search-box">
        <span class="search-icon">⌕</span>

        <input
            type="text"
            id="searchInput"
            placeholder="Search package name..."
        >
    </div>

    <div class="result-container" id="results">

        <div class="empty-state">
            <h2>Start Searching</h2>
            <p>Type any package name to display ICTI</p>
        </div>

    </div>

</div>

<div class="toast" id="toast">
    ICTI Copied Successfully
</div>

<script>

let packages = [];

fetch("ICTI-Tool.xlsx")
.then(response => response.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data,{type:"array"});

    const sheetName = workbook.SheetNames[0];

    const sheet = workbook.Sheets[sheetName];

    packages = XLSX.utils.sheet_to_json(sheet);

})
.catch(error => {

    console.error("Excel File Error:", error);

});

const searchInput = document.getElementById("searchInput");

const results = document.getElementById("results");

searchInput.addEventListener("input", () => {

    const value = searchInput.value.toLowerCase().trim();

    if(value === ""){

        results.innerHTML = `
        <div class="empty-state">
            <h2>Start Searching</h2>
            <p>Type any package name to display ICTI</p>
        </div>
        `;

        return;
    }

    const filtered = packages.filter(item =>
        item["Package Name"] &&
        item["Package Name"].toLowerCase().includes(value)
    );

    if(filtered.length === 0){

        results.innerHTML = `
        <div class="empty-state">
            <h2>No Results Found</h2>
            <p>Try another package name</p>
        </div>
        `;

        return;
    }

    results.innerHTML = "";

    filtered.forEach(item => {

        results.innerHTML += `

        <div class="result-card">

            <div class="package-title">
                ${item["Package Name"]}
            </div>

            <div class="icti-row">

                <div class="icti-code">
                    ${item["Package ICTI"]}
                </div>

                <button
                    class="copy-btn"
                    onclick="copyICTI('${item["Package ICTI"]}')"
                >
                    Copy
                </button>

            </div>

        </div>

        `;
    });

});

function copyICTI(text){

    navigator.clipboard.writeText(text);

    const toast = document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    },2000);
}

</script>

</body>
</html>
